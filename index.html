<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx Web Server</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 40px;
            border-radius: 12px;
            background-color: #1e293b;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        p {
            font-size: 20px;
            color: #cbd5e1;
        }

        .status {
            margin-top: 20px;
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to Nginx Server</h1>
        <p>Your web server is running successfully.</p>
        <div class="status">
            Server Status: ONLINE
        </div>
    </div>
</body>
</html>
